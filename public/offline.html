<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Coterie</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #faf7f2;
        color: #1c1a17;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: #1c1a17;
        color: #faf7f2;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        margin-bottom: 20px;
      }
      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 600;
        font-size: 26px;
        margin: 0 0 8px;
      }
      p {
        color: rgba(28, 26, 23, 0.6);
        max-width: 22rem;
        line-height: 1.6;
        margin: 0 0 24px;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: #1c1a17;
        color: #faf7f2;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 24px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">c</div>
      <h1>You&rsquo;re offline</h1>
      <p>
        Coterie needs a connection to load the latest posts and communities.
        Check your network and try again.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
